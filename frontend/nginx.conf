server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy para o backend ─────────────────────────────────────────────────
    # Quando VITE_API_URL=/api (single-host), nginx encaminha para o container backend.
    # Quando VITE_API_URL=https://api.externo.com, o navegador chama direto (sem passar aqui).
    #
    # O resolver 127.0.0.11 é o DNS interno do Docker. Usar uma variável força o nginx
    # a resolver o hostname em tempo de request (lazy), evitando a falha de inicialização
    # quando o container backend ainda não está disponível no momento do start.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream http://backend:8080;
        proxy_pass         $upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SPA — todas as rotas caem no index.html ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache para assets estáticos ───────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
